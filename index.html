<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>این یا آن • ما دو تا ❤️ v3.0</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <div id="myProfile"></div>
      <div id="partnerProfile"></div>
    </div>

    <h1>🎲 این یا آن • ما دو تا</h1>
    <p style="text-align:center;color:#c2185b" id="status">نسخه ۳.۰ - سوال سفارشی</p>

    <div style="text-align:center; margin:15px 0;">
      <button class="btn" onclick="showQuestionEditor()" style="background:#1e88e5;">+ اضافه کردن سوال جدید</button>
    </div>

    <div id="game"></div>

    <div style="text-align:center">
      <button class="btn" id="finishBtn" onclick="finishGame()" disabled>پایان بازی</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    let questions = JSON.parse(localStorage.getItem('customQuestions')) || [
      {q:"قهوه یا چای؟", options:["قهوه", "چای"]},
      {q:"سفر دریا یا کوه؟", options:["دریا", "کوه"]},
      // می‌تونی اینجا سوال‌های پیش‌فرض بیشتری بذاری
    ];

    let myAnswers = [];
    let partnerAnswers = null;
    let isSecondPlayer = false;

    function renderProfiles() {
      // همان کد قبلی پروفایل
      document.getElementById('myProfile').innerHTML = `<strong>${localStorage.getItem('myName') || "من 🧔"}</strong>`;
      document.getElementById('partnerProfile').innerHTML = `<strong>${localStorage.getItem('partnerName') || "اون 💄"}</strong>`;
    }

    function showQuestionEditor() {
      const q = prompt("سوال رو بنویس:");
      if (!q) return;

      const options = [];
      for (let i = 1; i <= 4; i++) {
        const opt = prompt(`گزینه ${i} (خالی بگذار اگر تموم شد):`);
        if (!opt) break;
        options.push(opt);
      }

      if (options.length < 2) {
        alert("حداقل ۲ گزینه نیاز است!");
        return;
      }

      questions.push({q, options});
      localStorage.setItem('customQuestions', JSON.stringify(questions));
      alert("سوال جدید اضافه شد ✅");
      renderGame();
    }

    function renderGame() {
      let html = '';
      myAnswers = new Array(questions.length).fill(null);

      questions.forEach((q, i) => {
        let optsHtml = '';
        q.options.forEach((opt, j) => {
          optsHtml += `<button class="option" onclick="selectAnswer(${i}, ${j})">${opt}</button>`;
        });
        html += `<div class="question">
          <strong>${i+1}. ${q.q}</strong>
          <div class="options">${optsHtml}</div>
        </div>`;
      });
      document.getElementById('game').innerHTML = html;
    }

    function selectAnswer(qIndex, optionIndex) {
      myAnswers[qIndex] = optionIndex;
      const qDiv = document.querySelectorAll('.question')[qIndex];
      qDiv.querySelectorAll('button').forEach((b, idx) => {
        b.classList.toggle('selected', idx === optionIndex);
      });
      document.getElementById('finishBtn').disabled = myAnswers.includes(null);
    }

    function finishGame() {
      if (myAnswers.includes(null)) return;
      alert("بازی تموم شد! (لینک اشتراکی در نسخه بعدی کامل میشه)");
      // بعداً لینک اشتراکی رو اینجا اضافه می‌کنیم
    }

    window.onload = () => {
      renderProfiles();
      renderGame();
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>این یا آن • ما دو تا • v3.8.1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎲 این یا آن • ما دو تا</h1>
    <p style="text-align:center;color:#c2185b" id="status">نسخه ۳.۸.۱</p>

    <div style="text-align:center; margin:15px 0;" id="adminButtons">
      <button class="btn" onclick="addNewQuestion()" style="background:#1e88e5; width:auto; padding:12px 24px;">+ سوال جدید</button>
    </div>

    <div id="game"></div>

    <div style="text-align:center">
      <button class="btn" id="finishBtn" onclick="finishGame()" disabled>پایان بازی</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    let questions = JSON.parse(localStorage.getItem('customQuestions')) || [
      {q: "قهوه یا چای؟", options: ["قهوه", "چای"]},
      {q: "سفر دریا یا کوه؟", options: ["دریا", "کوه"]},
      {q: "صبح یا شب؟", options: ["صبح", "شب"]}
    ];

    let myAnswers = [];
    let myName = "";
    let partnerName = "";
    let partnerAnswers = null;
    let isSecondPlayer = false;
    let isResultMode = false;

    function loadFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const p = params.get('p');
      const r = params.get('r');
      const pn = params.get('pn');
      const p1n = params.get('p1n'); // نام نفر اول

      if (p1n) partnerName = decodeURIComponent(p1n);

      if (r) {
        // حالت نمایش نتیجه نهایی
        isResultMode = true;
        partnerAnswers = p ? p.split('').map(Number) : null;
        myAnswers = r.split('').map(Number);
        if (pn) myName = decodeURIComponent(pn); // نام نفر دوم
        showFinalResult();
      } else if (p) {
        // حالت بازی کردن نفر دوم
        partnerAnswers = p.split('').map(Number);
        isSecondPlayer = true;
        document.getElementById('adminButtons').style.display = 'none';
      }
    }

    function addNewQuestion() {
      const q = prompt("سوال جدید:");
      if (!q) return;
      const options = [];
      for (let i = 1; i <= 4; i++) {
        const opt = prompt(`گزینه ${i}:`);
        if (!opt) break;
        options.push(opt);
      }
      if (options.length < 2) return alert("حداقل ۲ گزینه!");
      questions.push({q, options});
      localStorage.setItem('customQuestions', JSON.stringify(questions));
      renderGame();
    }

    function renderGame() {
      if (isResultMode) return;
      let html = '';
      myAnswers = new Array(questions.length).fill(null);

      questions.forEach((q, i) => {
        let opts = q.options.map((opt, j) => 
          `<button class="option" onclick="selectAnswer(${i}, ${j})">${opt}</button>`
        ).join('');

        let admin = !isSecondPlayer ? 
          `<span onclick="editQuestion(${i})" style="cursor:pointer;margin:0 6px;">✏️</span>
           <span onclick="deleteQuestion(${i})" style="cursor:pointer;color:#e91e63;">🗑️</span>` : '';

        html += `<div class="question">
          <div style="display:flex; justify-content:space-between;">
            <strong>${i+1}. ${q.q}</strong>
            <div>${admin}</div>
          </div>
          <div class="options">${opts}</div>
        </div>`;
      });
      document.getElementById('game').innerHTML = html;
    }

    function selectAnswer(qIndex, optIndex) {
      myAnswers[qIndex] = optIndex;
      const buttons = document.querySelectorAll('.question')[qIndex].querySelectorAll('button');
      buttons.forEach((b, idx) => b.classList.toggle('selected', idx === optIndex));
      document.getElementById('finishBtn').disabled = myAnswers.includes(null);
    }

    function finishGame() {
      if (myAnswers.includes(null)) return;

      myName = prompt("اسمتو وارد کن:", myName || "");
      if (!myName) return;

      const encodedMyAnswers = myAnswers.join('');
      const base = window.location.origin + window.location.pathname;

      let html = `<h2 style="text-align:center">🎉 بازی توسط ${myName} تموم شد!</h2>`;

      if (isSecondPlayer) {
        // محاسبه درصد تطابق بر اساس تعداد واقعی سوالات
        const correctCount = myAnswers.filter((a, i) => a === partnerAnswers[i]).length;
        const matchPercent = Math.round((correctCount / questions.length) * 100);
        
        html += `<p style="font-size:26px;text-align:center"><strong>تطابق: ${matchPercent}%</strong></p>`;
        
        questions.forEach((q, i) => {
          const myOpt = q.options[myAnswers[i]];
          const partnerOpt = q.options[partnerAnswers[i]];
          html += `<p><strong>${i+1}. ${q.q}</strong><br>${myName}: ${myOpt} | ${partnerName || "نفر اول"}: ${partnerOpt} ${myAnswers[i] === partnerAnswers[i] ? '❤️' : ''}</p>`;
        });

        // ساخت لینک نتیجه نهایی برای فرستادن دوباره به نفر اول
        const encodedPartnerAnswers = partnerAnswers.join('');
        const resultLink = `${base}?p=${encodedPartnerAnswers}&r=${encodedMyAnswers}&p1n=${encodeURIComponent(partnerName)}&pn=${encodeURIComponent(myName)}`;
        
        html += `<p style="margin-top:20px">لینک نتیجه نهایی (برای فرستادن به ${partnerName || 'نفر اول'}):</p>`;
        html += `<input type="text" value="${resultLink}" style="width:100%;padding:12px" readonly>`;
        html += `<button class="btn" onclick="copyLink('${resultLink}')">کپی لینک نتیجه</button>`;
      } else {
        // نفر اول بازی را تمام کرده و لینک دعوت می‌سازد
        const shareLink = `${base}?p=${encodedMyAnswers}&p1n=${encodeURIComponent(myName)}`;
        html += `<p>لینک بازی را برای طرف مقابل بفرستید:</p><input value="${shareLink}" style="width:100%;padding:12px" readonly>`;
        html += `<button class="btn" onclick="copyLink('${shareLink}')">کپی لینک بازی</button>`;
      }

      document.getElementById('result').innerHTML = html;
      document.getElementById('result').style.display = 'block';
    }

    function copyLink(link) {
      navigator.clipboard.writeText(link).then(() => alert('✅ لینک کپی شد'));
    }

    function showFinalResult() {
      let html = `<h2 style="text-align:center">نتیجه نهایی ❤️</h2>`;
      
      const correctCount = myAnswers.filter((a, i) => a === partnerAnswers[i]).length;
      const matchPercent = Math.round((correctCount / questions.length) * 100);
      html += `<p style="font-size:26px;text-align:center"><strong>تطابق: ${matchPercent}%</strong></p>`;

      questions.forEach((q, i) => {
        const myOpt = q.options[myAnswers[i]] || "انتخاب نشده";
        const partnerOpt = q.options[partnerAnswers[i]] || "انتخاب نشده";
        html += `<p><strong>${i+1}. ${q.q}</strong><br>${partnerName || "نفر اول"}: ${partnerOpt} | ${myName || "نفر دوم"}: ${myOpt} ${myAnswers[i] === partnerAnswers[i] ? '❤️' : ''}</p>`;
      });
      document.getElementById('result').innerHTML = html;
      document.getElementById('result').style.display = 'block';
    }

    // توابع ادیت و حذف که در رندر استفاده شده‌اند اما در کد اصلی‌تان بدنه نداشتند
    function editQuestion(index) {
      const currentQ = questions[index];
      const newQ = prompt("ویرایش سوال:", currentQ.q);
      if (!newQ) return;
      currentQ.q = newQ;
      localStorage.setItem('customQuestions', JSON.stringify(questions));
      renderGame();
    }

    function deleteQuestion(index) {
      if (!confirm("آیا از حذف این سوال مطمئن هستید؟")) return;
      questions.splice(index, 1);
      localStorage.setItem('customQuestions', JSON.stringify(questions));
      renderGame();
    }

    window.onload = () => {
      loadFromUrl();
      renderGame();
    };
  </script>
</body>
</html>

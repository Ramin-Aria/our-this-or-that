<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>این یا آن • بازی ما ❤️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
    body {
      font-family: 'Vazirmatn', Tahoma, sans-serif;
      background: linear-gradient(135deg, #fff0f5, #e0f2fe);
      margin: 0; padding: 15px; min-height: 100vh;
    }
    .container {
      max-width: 740px;
      margin: auto;
      background: white;
      border-radius: 28px;
      padding: 30px 20px;
      box-shadow: 0 20px 60px rgba(233,30,99,0.15);
    }
    h1 { color: #e91e63; text-align: center; }
    .question { background: #fff0f5; padding: 20px; margin: 18px 0; border-radius: 20px; }
    .options { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
    @media (min-width: 600px) { .options { flex-direction: row; } }
    button { padding: 18px; border: none; border-radius: 16px; font-size: 17px; cursor: pointer; }
    button.selected { background: #e91e63 !important; color: white; transform: scale(1.05); }
    .btn { background: #e91e63; color: white; padding: 16px; border-radius: 50px; width: 100%; margin: 10px 0; font-size: 17px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎲 این یا آن • بازی ما ❤️</h1>
    <p style="text-align:center; color:#c2185b;">۲۰ سوال رمانتیک</p>
    <div id="game"></div>
    <div style="text-align:center; margin:30px 0;">
      <button class="btn" onclick="finishGame()" id="finishBtn" disabled>پایان بازی و گرفتن لینک</button>
    </div>
    <div id="result"></div>
  </div>

  <script>
    let answers = new Array(20).fill(null);
    let partnerAnswers = null;

    const questions = [ /* ۲۰ سوال قبلی */ 
      {q: "قهوه یا چای؟", a: "قهوه", b: "چای"},
      {q: "سفر دریا یا کوه؟", a: "دریا", b: "کوه"},
      {q: "صبح یا شب؟", a: "صبح", b: "شب"},
      {q: "بوسه روی لب یا پیشونی؟", a: "لب", b: "پیشونی"},
      {q: "هدیه دادن یا هدیه گرفتن؟", a: "دادن", b: "گرفتن"},
      {q: "فیلم عاشقانه یا کمدی؟", a: "عاشقانه", b: "کمدی"},
      {q: "پیام صوتی یا متن طولانی؟", a: "صوتی", b: "متن"},
      {q: "غافلگیری یا برنامه‌ریزی دقیق؟", a: "غافلگیری", b: "برنامه‌ریزی"},
      {q: "شام رستوران یا شام خونگی؟", a: "رستوران", b: "خونگی"},
      {q: "دست گرفتن یا بغل کردن؟", a: "دست گرفتن", b: "بغل کردن"},
      {q: "سفر نزدیک یا سفر طولانی؟", a: "نزدیک", b: "طولانی"},
      {q: "شکلات تلخ یا شیری؟", a: "تلخ", b: "شیری"},
      {q: "موسیقی آرام یا شاد؟", a: "آرام", b: "شاد"},
      {q: "پنجره باز یا بسته موقع خواب؟", a: "باز", b: "بسته"},
      {q: "تعطیلات ساحلی یا شهری؟", a: "ساحلی", b: "شهری"},
      {q: "اول صبح بیدار شدن یا شب بیدار موندن؟", a: "اول صبح", b: "شب بیدار"},
      {q: "هدیه گران یا معنادار؟", a: "گران", b: "معنادار"},
      {q: "تماس تلفنی یا چت طولانی؟", a: "تلفنی", b: "چت"},
      {q: "رقصیدن یا آروم حرف زدن؟", a: "رقصیدن", b: "حرف زدن"},
      {q: "عاشق شدن سریع یا آهسته؟", a: "سریع", b: "آهسته"}
    ];

    function renderGame() {
      let html = '';
      questions.forEach((q, i) => {
        html += `<div class="question">
          <strong>${i+1}. ${q.q}</strong>
          <div class="options">
            <button onclick="select(${i},'a')">${q.a}</button>
            <button onclick="select(${i},'b')">${q.b}</button>
          </div>
        </div>`;
      });
      document.getElementById('game').innerHTML = html;
    }

    function select(i, choice) {
      answers[i] = choice;
      document.querySelectorAll('.question')[i].querySelectorAll('button').forEach(b => b.classList.remove('selected'));
      event.target.classList.add('selected');
      document.getElementById('finishBtn').disabled = answers.includes(null);
    }

    function finishGame() {
      const encoded = answers.map(a => a === 'a' ? '1' : '2').join('');
      const link = window.location.origin + window.location.pathname + '?p=' + encoded;
      document.getElementById('result').innerHTML = `
        <p>لینک رو براش بفرست:</p>
        <input value="${link}" style="width:100%; padding:12px;" readonly>
        <button onclick="navigator.clipboard.writeText('${link}');alert('کپی شد!')" style="margin-top:10px;">کپی لینک</button>`;
    }

    window.onload = renderGame;
  </script>
</body>
</html>

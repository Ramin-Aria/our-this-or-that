<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>این یا آن • ما دو تا ❤️ v2.1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div style="display:flex; justify-content:space-between; margin-bottom:25px; font-size:18px;">
      <div id="myProfile"></div>
      <div id="partnerProfile" style="opacity:0.75;"></div>
    </div>

    <h1>🎲 این یا آن • ما دو تا</h1>
    <p style="text-align:center; color:#c2185b; margin-bottom:20px;" id="status">۲۰ سوال رمانتیک - v2.1</p>

    <div class="progress"><div class="progress-bar" id="progress"></div></div>

    <div id="game"></div>

    <div style="text-align:center">
      <button class="btn" id="finishBtn" onclick="finishGame()" disabled>پایان بازی</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    let myName = localStorage.getItem('myName') || "من 🧔";
    let partnerName = localStorage.getItem('partnerName') || "اون 💄";

    let myAnswers = new Array(20).fill(null);
    let partnerAnswers = null;
    let isSecondPlayer = false;

    const questions = [
      {q:"قهوه یا چای؟",a:"قهوه",b:"چای"},{q:"سفر دریا یا کوه؟",a:"دریا",b:"کوه"},
      {q:"صبح یا شب؟",a:"صبح",b:"شب"},{q:"بوسه روی لب یا پیشونی؟",a:"لب",b:"پیشونی"},
      {q:"هدیه دادن یا گرفتن؟",a:"دادن",b:"گرفتن"},{q:"فیلم عاشقانه یا کمدی؟",a:"عاشقانه",b:"کمدی"},
      {q:"پیام صوتی یا متن؟",a:"صوتی",b:"متن"},{q:"غافلگیری یا برنامه‌ریزی؟",a:"غافلگیری",b:"برنامه‌ریزی"},
      {q:"شام رستوران یا خونگی؟",a:"رستوران",b:"خونگی"},{q:"دست گرفتن یا بغل؟",a:"دست گرفتن",b:"بغل"},
      {q:"سفر نزدیک یا طولانی؟",a:"نزدیک",b:"طولانی"},{q:"شکلات تلخ یا شیری؟",a:"تلخ",b:"شیری"},
      {q:"موسیقی آرام یا شاد؟",a:"آرام",b:"شاد"},{q:"پنجره باز یا بسته؟",a:"باز",b:"بسته"},
      {q:"ساحلی یا شهری؟",a:"ساحلی",b:"شهری"},{q:"اول صبح یا شب بیدار؟",a:"اول صبح",b:"شب بیدار"},
      {q:"هدیه گران یا معنادار؟",a:"گران",b:"معنادار"},{q:"تلفنی یا چت؟",a:"تلفنی",b:"چت"},
      {q:"رقصیدن یا حرف زدن؟",a:"رقصیدن",b:"حرف زدن"},{q:"عاشق شدن سریع یا آهسته؟",a:"سریع",b:"آهسته"}
    ];

    function renderProfiles() {
      document.getElementById('myProfile').innerHTML = `<strong>${myName}</strong>`;
      document.getElementById('partnerProfile').innerHTML = `<strong>${partnerName}</strong>`;
    }

    function loadFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const p = params.get('p');
      if (p && p.length === 20) {
        partnerAnswers = p.split('').map(c => c === '1' ? 'a' : 'b');
        isSecondPlayer = true;
        document.getElementById('status').innerHTML = `نوبت ${partnerName} ❤️`;
      }
    }

    function renderGame() {
      let html = '';
      questions.forEach((q, i) => {
        html += `<div class="question">
          <strong>${i+1}. ${q.q}</strong>
          <div class="options">
            <button class="option" onclick="selectAnswer(${i}, 'a')">${q.a}</button>
            <button class="option" onclick="selectAnswer(${i}, 'b')">${q.b}</button>
          </div>
        </div>`;
      });
      document.getElementById('game').innerHTML = html;
    }

    function selectAnswer(i, choice) {
      myAnswers[i] = choice;
      const qDiv = document.querySelectorAll('.question')[i];
      qDiv.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
      event.target.classList.add('selected');
      document.getElementById('finishBtn').disabled = myAnswers.includes(null);
    }

    function finishGame() {
      if (myAnswers.includes(null)) return;

      const encoded = myAnswers.map(a => a === 'a' ? '1' : '2').join('');
      const base = window.location.origin + window.location.pathname;

      let html = `<h2 style="text-align:center">🎉 بازی تموم شد!</h2>`;

      if (isSecondPlayer) {
        let match = 0;
        html += `<p style="font-size:26px; text-align:center"><strong>تطابق: ${Math.round(myAnswers.filter((a,i) => a === partnerAnswers[i]).length / 20 * 100)}%</strong></p>`;
        
        questions.forEach((q,i) => {
          const my = myAnswers[i]==='a' ? q.a : q.b;
          const partner = partnerAnswers[i]==='a' ? q.a : q.b;
          html += `<p><strong>${i+1}. ${q.q}</strong><br>${myName}: ${my} | ${partnerName}: ${partner} ${myAnswers[i]===partnerAnswers[i] ? '❤️' : ''}</p>`;
        });

        const resultLink = `${base}?p=${partnerAnswers.map(a => a==='a'?'1':'2').join('')}&r=${encoded}`;
        html += `<p style="margin-top:25px">لینک نتیجه رو براش بفرست:</p>`;
        html += `<input type="text" value="${resultLink}" style="width:100%; padding:12px; font-size:14px;" readonly>`;
        html += `<button class="btn" onclick="copyLink('${resultLink}')">کپی لینک نتیجه</button>`;
      } else {
        const shareLink = `${base}?p=${encoded}`;
        html += `<p>لینک بازی:</p><input value="${shareLink}" style="width:100%;padding:12px" readonly>`;
        html += `<button class="btn" onclick="copyLink('${shareLink}')">کپی لینک</button>`;
      }

      document.getElementById('result').innerHTML = html;
      document.getElementById('result').style.display = 'block';
    }

    function copyLink(link) {
      navigator.clipboard.writeText(link).then(() => alert('✅ لینک کپی شد'));
    }

    window.onload = () => {
      renderProfiles();
      loadFromUrl();
      renderGame();
    };
  </script>
</body>
</html>

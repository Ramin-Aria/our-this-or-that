<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>این یا آن • v5ما دو تا ❤️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
    body { font-family: 'Vazirmatn', sans-serif; background: linear-gradient(135deg, #fff0f5, #e0f2fe); margin:0; padding:12px; min-height:100vh; }
    .container { max-width: 720px; margin:auto; background:white; border-radius:28px; padding:25px; box-shadow:0 20px 60px rgba(233,30,99,0.15); }
    h1 { color:#e91e63; text-align:center; margin:15px 0; }
    .question { background:#fff0f5; padding:20px; margin:16px 0; border-radius:20px; }
    .options { display:flex; flex-direction:column; gap:12px; margin-top:12px; }
    @media (min-width:600px) { .options { flex-direction:row; } }
    button.option { padding:18px; border:2px solid #f8bbd0; background:white; border-radius:16px; font-size:17px; cursor:pointer; transition:all 0.3s; }
    button.option.selected { background:#e91e63; color:white; border-color:#e91e63; transform:scale(1.04); }
    .btn { background:#e91e63; color:white; border:none; padding:16px; border-radius:50px; font-size:17px; width:100%; margin:12px 0; cursor:pointer; }
    .result { margin-top:30px; padding:25px; background:#f0f4c3; border-radius:24px; display:none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎲 این یا آن • ما دو تا</h1>
    <p style="text-align:center;color:#c2185b" id="status">۲۰ سوال رمانتیک</p>

    <div id="game"></div>

    <div style="text-align:center">
      <button class="btn" id="finishBtn" onclick="finishGame()" disabled>پایان بازی</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    let myAnswers = new Array(20).fill(null);
    let partnerAnswers = null;
    let isSecondPlayer = false;

    const questions = [
      {q:"قهوه یا چای؟",a:"قهوه",b:"چای"},{q:"سفر دریا یا کوه؟",a:"دریا",b:"کوه"},
      {q:"صبح یا شب؟",a:"صبح",b:"شب"},{q:"بوسه روی لب یا پیشونی؟",a:"لب",b:"پیشونی"},
      {q:"هدیه دادن یا گرفتن؟",a:"دادن",b:"گرفتن"},{q:"فیلم عاشقانه یا کمدی؟",a:"عاشقانه",b:"کمدی"},
      {q:"پیام صوتی یا متن؟",a:"صوتی",b:"متن"},{q:"غافلگیری یا برنامه‌ریزی؟",a:"غافلگیری",b:"برنامه‌ریزی"},
      {q:"شام رستوران یا خونگی؟",a:"رستوران",b:"خونگی"},{q:"دست گرفتن یا بغل؟",a:"دست گرفتن",b:"بغل"},
      {q:"سفر نزدیک یا طولانی؟",a:"نزدیک",b:"طولانی"},{q:"شکلات تلخ یا شیری؟",a:"تلخ",b:"شیری"},
      {q:"موسیقی آرام یا شاد؟",a:"آرام",b:"شاد"},{q:"پنجره باز یا بسته؟",a:"باز",b:"بسته"},
      {q:"ساحلی یا شهری؟",a:"ساحلی",b:"شهری"},{q:"اول صبح یا شب بیدار؟",a:"اول صبح",b:"شب بیدار"},
      {q:"هدیه گران یا معنادار؟",a:"گران",b:"معنادار"},{q:"تلفنی یا چت؟",a:"تلفنی",b:"چت"},
      {q:"رقصیدن یا حرف زدن؟",a:"رقصیدن",b:"حرف زدن"},{q:"عاشق شدن سریع یا آهسته؟",a:"سریع",b:"آهسته"}
    ];

    function loadDataFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const p = params.get('p');
      if (p && p.length === 20) {
        partnerAnswers = p.split('').map(c => c === '1' ? 'a' : 'b');
        isSecondPlayer = true;
        document.getElementById('status').innerHTML = 'نوبت توئه ❤️ بازی کن';
      }
    }

    function renderGame() {
      let html = '';
      questions.forEach((q,i) => {
        html += `<div class="question">
          <strong>${i+1}. ${q.q}</strong>
          <div class="options">
            <button class="option" onclick="selectAnswer(${i},'a')">${q.a}</button>
            <button class="option" onclick="selectAnswer(${i},'b')">${q.b}</button>
          </div>
        </div>`;
      });
      document.getElementById('game').innerHTML = html;
    }

    function selectAnswer(i, choice) {
      myAnswers[i] = choice;
      const qDiv = document.querySelectorAll('.question')[i];
      qDiv.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
      event.target.classList.add('selected');
      document.getElementById('finishBtn').disabled = myAnswers.includes(null);
    }

    function finishGame() {
      if (myAnswers.includes(null)) return;

      const encodedMy = myAnswers.map(a => a==='a'?'1':'2').join('');
      const base = window.location.origin + window.location.pathname;

      let html = `<h2 style="text-align:center">🎉 بازی تموم شد!</h2>`;

      if (isSecondPlayer && partnerAnswers) {
        // نفر دوم - نمایش نتیجه + تولید لینک برای نفر اول
        let match = 0;
        html += `<p style="font-size:26px;text-align:center"><strong>تطابق ما: ${Math.round(myAnswers.filter((a,i)=>a===partnerAnswers[i]).length / 20 * 100)}%</strong></p>`;
        
        questions.forEach((q,i) => {
          const my = myAnswers[i]==='a' ? q.a : q.b;
          const partner = partnerAnswers[i]==='a' ? q.a : q.b;
          html += `<p><strong>${i+1}. ${q.q}</strong><br>تو: ${my} | اون: ${partner} ${myAnswers[i]===partnerAnswers[i]?'❤️':''}</p>`;
        });

        // لینک نتیجه برای نفر اول
        const resultLink = `${base}?p=${partnerAnswers.map(a => a==='a'?'1':'2').join('')}&r=${encodedMy}`;
        html += `<p style="margin-top:20px">لینک نتیجه رو برای طرف مقابل بفرست:</p>`;
        html += `<input type="text" value="${resultLink}" style="width:100%;padding:12px;font-size:14px" readonly>`;
        html += `<button class="btn" onclick="copyLink('${resultLink}')">کپی لینک نتیجه</button>`;
      } else if (!isSecondPlayer) {
        // نفر اول
        const shareLink = `${base}?p=${encodedMy}`;
        html += `<p>لینک بازی رو بفرست:</p><input value="${shareLink}" style="width:100%;padding:12px" readonly>`;
        html += `<button class="btn" onclick="copyLink('${shareLink}')">کپی لینک</button>`;
      }

      document.getElementById('result').innerHTML = html;
      document.getElementById('result').style.display = 'block';
    }

    function copyLink(link) {
      navigator.clipboard.writeText(link).then(() => alert('✅ لینک کپی شد'));
    }

    window.onload = () => {
      loadDataFromUrl();
      renderGame();
    };
  </script>
</body>
</html>

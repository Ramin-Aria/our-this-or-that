<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Are We a Match? • ما دو تا</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a0206">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="style.css">
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBWXOdwUk6GFQ7ZMEHlafIJtX6Tl6Zmtd4",
      authDomain: "are-we-a-match.firebaseapp.com",
      databaseURL: "https://are-we-a-match-default-rtdb.firebaseio.com",
      projectId: "are-we-a-match",
      storageBucket: "are-we-a-match.firebasestorage.app",
      messagingSenderId: "771390342120",
      appId: "1:771390342120:web:5ba6954bfc19cf27239a5d"
    };
      
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentUser = localStorage.getItem('chatUser') || null;
    let isRegisterMode = false;
    const ADMIN_USERNAME = 'admin';

    function checkUserAuth() {
      const authModal = document.getElementById('authModal');
      const userStatusNav = document.getElementById('userStatusNav');
      const loggedUserName = document.getElementById('loggedUserName');
      const adminButtons = document.getElementById('adminButtons');

      if (!currentUser) {
        if (authModal) authModal.style.display = 'flex';
        if (userStatusNav) userStatusNav.style.display = 'none';
        if (adminButtons) adminButtons.style.display = 'none';
      } else {
        if (authModal) authModal.style.display = 'none';
        if (userStatusNav) userStatusNav.style.display = 'flex';
        if (loggedUserName) loggedUserName.innerText = currentUser.replace(/_/g, ' ');
        
        if (adminButtons) {
          if (currentUser.toLowerCase() === ADMIN_USERNAME) {
            adminButtons.style.display = 'block';
          } else {
            adminButtons.style.display = 'none';
          }
        }
        console.log("کاربر لاگین شده است:", currentUser);
      }
    }

    function logoutUser() {
      if (confirm("Are you sure you want to logout?")) {
        localStorage.removeItem('chatUser');
        currentUser = null;
        location.reload();
      }
    }

    function toggleAuthMode() {
      isRegisterMode = !isRegisterMode;
      const title = document.getElementById('authTitle');
      const btn = document.getElementById('authPrimaryBtn');
      const toggleText = document.getElementById('authToggleText');
      const confirmArea = document.getElementById('confirmPasswordArea');
      
      document.getElementById('authConfirmPassword').value = "";

      if (isRegisterMode) {
        title.innerText = "ثبت نام حساب جدید";
        btn.innerText = "ثبت نام";
        toggleText.innerText = "قبلاً حساب ساخته‌اید؟ وارد شوید";
        confirmArea.style.display = 'block';
      } else {
        title.innerText = "ورود به برنامه";
        btn.innerText = "ورود";
        toggleText.innerText = "حساب کاربری ندارید؟ ثبت نام کنید";
        confirmArea.style.display = 'none';
      }
    }

    function togglePasswordVisibility(inputId, iconId) {
      const passwordInput = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.innerText = 'visibility_off';
        icon.style.color = 'var(--text-gold)';
      } else {
        passwordInput.type = 'password';
        icon.innerText = 'visibility';
        icon.style.color = 'rgba(255,255,255,0.5)';
      }
    }
    
    function handleAuth() {
      const usernameInput = document.getElementById('authUsername').value.trim();
      const passwordInput = document.getElementById('authPassword').value.trim();
      const confirmPasswordInput = document.getElementById('authConfirmPassword').value.trim();

      if (!usernameInput || !passwordInput) {
        alert("لطفاً تمام فیلدها را پر کنید!");
        return;
      }
      
      if (passwordInput.length < 4) {
        alert("رمز عبور باید حداقل ۴ کاراکتر باشد!");
        return;
      }
      
      const cleanUsername = usernameInput.replace(/[.#$\[\]]/g, "_");

      if (isRegisterMode) {
        if (!confirmPasswordInput) {
          alert("لطفاً تکرار رمز عبور را وارد کنید!");
          return;
        }
        if (passwordInput !== confirmPasswordInput) {
          alert("رمز عبور و تکرار آن با هم مطابقت ندارند!");
          return;
        }

        database.ref('users/' + cleanUsername).once('value').then((snapshot) => {
          if (snapshot.exists()) {
            alert("این نام کاربری قبلاً انتخاب شده است! لطفاً نام دیگری انتخاب کنید.");
          } else {
            database.ref('users/' + cleanUsername).set({
              password: passwordInput,
              displayName: usernameInput
            }).then(() => {
              alert("ثبت نام با موفقیت انجام شد!");
              loginUser(cleanUsername);
            });
          }
        });
      } else {
        database.ref('users/' + cleanUsername).once('value').then((snapshot) => {
          if (snapshot.exists()) {
            const userData = snapshot.val();
            if (userData.password === passwordInput) {
              alert(`خوش آمدید ${userData.displayName}!`);
              loginUser(cleanUsername);
            } else {
              alert("رمز عبور اشتباه است!");
            }
          } else {
            alert("کاربری با این نام یافت نشد! ابتدا ثبت نام کنید.");
          }
        });
      }
    }
    
    function loginUser(username) {
      localStorage.setItem('chatUser', username);
      currentUser = username;
      document.getElementById('authModal').style.display = 'none';
      location.reload();
    }
  </script>
</head>
<body>
  <div class="container">
    <div class="bg-hearts"></div>
    
    <div id="userStatusNav" class="user-status-nav" style="display: none;">
      <div class="user-status-info">حساب کاربری: <span id="loggedUserName"></span></div>
      <button onclick="logoutUser()" class="btn-logout">Logout</button>
    </div>
    
    <h1 class="en-title">Are We a Match?</h1>

    <div style="text-align:center; margin:20px 0 10px 0; display: none;" id="adminButtons">
      <button class="btn-admin" onclick="addNewQuestion()">BUILD A QUESTION</button>
    </div>

    <div id="game"></div>

    <div style="text-align:center" id="finishActionArea">
      <button class="btn" id="finishBtn" onclick="finishGame()" disabled>پایان بازی</button>
    </div>

    <div id="result" class="result"></div>

    <div style="text-align:center; margin-top:20px;">
      <button class="btn btn-history-trigger" onclick="toggleHistoryBox()">HISTORY</button>
    </div>

    <div id="historyInlineBox" class="history-inline-box" style="display: none;">
      <h3 class="history-box-title">GAME HISTORY</h3>
      <div id="inlineHistoryList"></div>
      <button class="btn-clear-history" onclick="clearHistory()">حذف کل تاریخچه</button>
    </div>

    <div id="status">BY RAMIN • VERSION 5.4.0</div>
  </div>

  <div id="authModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <h3 id="authTitle">ورود به برنامه</h3>
      
      <div class="auth-field-group">
        <label>نام کاربری (فقط انگلیسی):</label>
        <input type="text" id="authUsername" placeholder="e.g. Ramin" oninput="this.value = this.value.replace(/[^a-zA-Z0-9_]/g, '')">
      </div>

      <div class="auth-field-group">
        <label>رمز عبور:</label>
        <div class="password-wrapper">
          <input type="password" id="authPassword" placeholder="******">
          <span class="material-symbols-outlined" id="togglePasswordIcon" onclick="togglePasswordVisibility('authPassword', 'togglePasswordIcon')">visibility</span>
        </div>
      </div>

      <div id="confirmPasswordArea" class="auth-field-group" style="display: none;">
        <label>تکرار رمز عبور:</label>
        <div class="password-wrapper">
          <input type="password" id="authConfirmPassword" placeholder="******">
          <span class="material-symbols-outlined" id="toggleConfirmPasswordIcon" onclick="togglePasswordVisibility('authConfirmPassword', 'toggleConfirmPasswordIcon')">visibility</span>
        </div>
      </div>

      <button id="authPrimaryBtn" onclick="handleAuth()" class="btn">ورود</button>
      
      <p id="authToggleText" onclick="toggleAuthMode()">حساب کاربری ندارید؟ ثبت نام کنید</p>
    </div>
  </div>

  <script>
    const defaultQuestions = [
      {q: "قهوه یا چای؟", options: ["قهوه", "چای"]}
    ];
    
    let questions = [...defaultQuestions];
    let myAnswers = [];
    let myName = "";
    let partnerName = "";
    let partnerAnswers = null;
    let isSecondPlayer = false;
    let isResultMode = false;

    function loadFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const p = params.get('p');
      const r = params.get('r');
      const pn = params.get('pn');
      const p1n = params.get('p1n');

      if (p1n) partnerName = decodeURIComponent(p1n);

      if (r) {
        isResultMode = true;
        questions = JSON.parse(localStorage.getItem('customQuestions')) || [...defaultQuestions];
        partnerAnswers = p ? p.split('').map(Number) : null;
        myAnswers = r.split('').map(Number);
        if (pn) myName = decodeURIComponent(pn);
        
        document.getElementById('finishActionArea').style.display = 'none';
        
        showFinalResult();
        saveToHistory(partnerName, myName, partnerAnswers, myAnswers);
      } else if (p) {
        questions = JSON.parse(localStorage.getItem('customQuestions')) || [...defaultQuestions];
        partnerAnswers = p.split('').map(Number);
        isSecondPlayer = true;
      } else {
        localStorage.removeItem('customQuestions');
      }
    }

    function addNewQuestion() {
      const q = prompt("سوال جدید:");
      if (!q) return;
      const options = [];
      for (let i = 1; i <= 4; i++) {
        const opt = prompt(`گزینه ${i}:`);
        if (!opt) break;
        options.push(opt);
      }
      if (options.length < 2) return alert("حداقل ۲ گزینه!");
      questions.push({q, options});
      localStorage.setItem('customQuestions', JSON.stringify(questions));
      renderGame();
    }

    function renderGame() {
      if (isResultMode) return;
      let html = '';
      myAnswers = new Array(questions.length).fill(null);

      questions.forEach((q, i) => {
        let opts = q.options.map((opt, j) => 
          `<button class="option" onclick="selectAnswer(${i}, ${j})">${opt}</button>`
        ).join('');

        let admin = (!isSecondPlayer && currentUser && currentUser.toLowerCase() === ADMIN_USERNAME) ? 
          `<span onclick="editQuestion(${i})" class="material-symbols-outlined action-icon">edit</span>
           <span onclick="deleteQuestion(${i})" class="material-symbols-outlined action-icon delete">delete</span>` : '';

        html += `<div class="question">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <strong>${i+1}. ${q.q}</strong>
            <div class="admin-actions">${admin}</div>
          </div>
          <div class="options">${opts}</div>
        </div>`;
      });
      document.getElementById('game').innerHTML = html;
    }

    function selectAnswer(qIndex, optIndex) {
      myAnswers[qIndex] = optIndex;
      const buttons = document.querySelectorAll('.question')[qIndex].querySelectorAll('button');
      buttons.forEach((b, idx) => b.classList.toggle('selected', idx === optIndex));
      document.getElementById('finishBtn').disabled = myAnswers.includes(null);
    }

    function finishGame() {
      if (myAnswers.includes(null)) return;

      myName = prompt("اسمتو وارد کن:", myName || (currentUser ? currentUser : ""));
      if (!myName) return;

      const encodedMyAnswers = myAnswers.join('');
      const base = window.location.origin + window.location.pathname;

      let html = `<h2 class="en-title" style="font-size:34px; margin-bottom:15px;">🎉 Done by ${myName}</h2>`;

      if (isSecondPlayer) {
        const correctCount = myAnswers.filter((a, i) => a === partnerAnswers[i]).length;
        const matchPercent = Math.round((correctCount / questions.length) * 100);
        
        html += `<p style="font-size:22px; text-align:center; color:var(--text-gold); font-weight:700; margin-bottom:20px;">تطابق شما: ${matchPercent}% ❤️</p>`;
        
        questions.forEach((q, i) => {
          const myOpt = q.options[myAnswers[i]];
          const partnerOpt = q.options[partnerAnswers[i]];
          html += `<p style="border-bottom:1px solid rgba(241, 211, 161, 0.1); padding-bottom:10px;">
            <strong>${i+1}. ${q.q}</strong><br>
            <span style="color:var(--text-gold)">${myName}:</span> ${myOpt} | <span style="color:var(--text-gold)">${partnerName || "Player 1"}:</span> ${partnerOpt} ${myAnswers[i] === partnerAnswers[i] ? '🌹' : ''}
          </p>`;
        });

        saveToHistory(partnerName, myName, partnerAnswers, myAnswers);

        const encodedPartnerAnswers = partnerAnswers.join('');
        const resultLink = `${base}?p=${encodedPartnerAnswers}&r=${encodedMyAnswers}&p1n=${encodeURIComponent(partnerName)}&pn=${encodeURIComponent(myName)}`;
        
        html += `<p style="margin-top:25px; color:rgba(255,255,255,0.6);">لینک نتیجه نهایی برای فرستادن به ${partnerName || 'Player 1'}:</p>`;
        html += `<input type="text" value="${resultLink}" readonly>`;
        html += `<button class="btn" onclick="copyLink('${resultLink}')">کپی لینک نتیجه</button>`;
      } else {
        const shareLink = `${base}?p=${encodedMyAnswers}&p1n=${encodeURIComponent(myName)}`;
        html += `<p style="color:rgba(255,255,255,0.6); margin-top:20px;">لینک بازی را برای طرف مقابل بفرستید:</p><input type="text" value="${shareLink}" readonly>`;
        html += `<button class="btn" onclick="copyLink('${shareLink}')">کپی لینک بازی</button>`;
      }

      document.getElementById('result').innerHTML = html;
      document.getElementById('result').style.display = 'block';
      document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
    }

    function copyLink(link) {
      navigator.clipboard.writeText(link).then(() => alert('✅ لینک کپی شد'));
    }

    function showFinalResult() {
      let html = `<h2 class="en-title" style="font-size:40px; margin-bottom:15px;">Our Story ❤️</h2>`;
      
      const correctCount = myAnswers.filter((a, i) => a === partnerAnswers[i]).length;
      const matchPercent = Math.round((correctCount / questions.length) * 100);
      html += `<p style="font-size:22px; text-align:center; color:var(--text-gold); font-weight:700; margin-bottom:25px;">تطابق نهایی: ${matchPercent}%</p>`;

      questions.forEach((q, i) => {
        const myOpt = q.options[myAnswers[i]] || "Not Selected";
        const partnerOpt = q.options[partnerAnswers[i]] || "Not Selected";
        html += `<p style="border-bottom:1px solid rgba(241, 211, 161, 0.1); padding-bottom:12px;">
          <strong>${i+1}. ${q.q}</strong><br>
          <span style="color:var(--text-gold)">${partnerName || "Player 1"}:</span> ${partnerOpt} | <span style="color:var(--text-gold)">${myName || "Player 2"}:</span> ${myOpt} ${myAnswers[i] === partnerAnswers[i] ? '🌹' : ''}
        </p>`;
      });
      document.getElementById('result').innerHTML = html;
      document.getElementById('result').style.display = 'block';
    }

    function saveToHistory(creator, player, pAnswers, rAnswers) {
      if (!creator || !player || !pAnswers || !rAnswers) return;
      let history = JSON.parse(localStorage.getItem('gameHistory')) || [];
      const correctCount = rAnswers.filter((a, i) => a === pAnswers[i]).length;
      const percent = Math.round((correctCount / pAnswers.length) * 100);
      
      const now = new Date();
      const dateTimeStr = now.toLocaleDateString('fa-IR') + ' ساعت ' + now.toLocaleTimeString('fa-IR', {hour: '2-digit', minute:'2-digit'});

      const isDuplicate = history.some(h => h.creator === creator && h.player === player && h.percent === percent);
      if (isDuplicate) return;

      const details = questions.map((q, i) => ({
        question: q.q,
        creatorOpt: q.options[pAnswers[i]] || "Not Selected",
        playerOpt: q.options[rAnswers[i]] || "Not Selected",
        isMatch: pAnswers[i] === rAnswers[i]
      }));

      history.unshift({ creator, player, percent, dateTime: dateTimeStr, details });
      localStorage.setItem('gameHistory', JSON.stringify(history));
    }

    function toggleHistoryBox() {
      const box = document.getElementById('historyInlineBox');
      if (box.style.display === 'none') {
        renderInlineHistory();
        box.style.display = 'block';
        box.scrollIntoView({ behavior: 'smooth' });
      } else {
        box.style.display = 'none';
      }
    }

    function renderInlineHistory() {
      const history = JSON.parse(localStorage.getItem('gameHistory')) || [];
      const listEl = document.getElementById('inlineHistoryList');
      
      if (history.length === 0) {
        listEl.innerHTML = `<p style="text-align:center; color:rgba(255,255,255,0.4); font-size:13px; padding:15px 0;">هیچ بازی ثبت شده‌ای در تاریخچه وجود ندارد.</p>`;
      } else {
        listEl.innerHTML = history.map((h, index) => `
          <div class="history-item">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
              <span class="history-role-text">طراح سوال: ${h.creator}</span>
              <span style="font-size:14px; font-weight:700; color:#4ade80;">${h.percent}% ❤️</span>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
              <span class="history-player-text">بازیکن: ${h.player}</span>
              <span style="font-size:11px; color:rgba(255,255,255,0.5);">${h.dateTime}</span>
            </div>
            <div style="text-align: right; margin-top: 5px;">
              <span class="text-details-trigger" onclick="toggleDetails(${index})">بیشتر...</span>
            </div>
            <div id="details-${index}" class="history-details-box" style="display:none;">
              ${h.details ? h.details.map((d, i) => `
                <div style="margin-bottom:8px; font-size:12px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:6px; text-align:right;">
                  <strong style="color:#fff; display:block; margin-bottom:3px;">${i+1}. ${d.question}</strong>
                  <span style="color:var(--text-gold)">${h.creator}:</span> ${d.creatorOpt} | <span style="color:var(--text-gold)">${h.player}:</span> ${d.playerOpt} ${d.isMatch ? '🌹' : ''}
                </div>
              `).join('') : '<p style="font-size:11px;color:gray;">جزئیاتی در دسترس نیست</p>'}
            </div>
          </div>
        `).join('');
      }
    }

    function toggleDetails(index) {
      const detailsEl = document.getElementById(`details-${index}`);
      detailsEl.style.display = detailsEl.style.display === 'none' ? 'block' : 'none';
    }

    function clearHistory() {
      if (confirm("آیا مایل به حذف کل تاریخچه بازی‌ها هستید؟")) {
        localStorage.removeItem('gameHistory');
        renderInlineHistory();
      }
    }

    function editQuestion(index) {
      const currentQ = questions[index];
      const newQ = prompt("ویرایش سوال:", currentQ.q);
      if (!newQ) return;
      currentQ.q = newQ;
      localStorage.setItem('customQuestions', JSON.stringify(questions));
      renderGame();
    }

    function deleteQuestion(index) {
      if (!confirm("آیا از حذف این سوال مطمئن هستید؟")) return;
      questions.splice(index, 1);
      localStorage.setItem('customQuestions', JSON.stringify(questions));
      renderGame();
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadFromUrl();
      checkUserAuth();
      renderGame();

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('PWA Service Worker با موفقیت ثبت شد!', reg))
          .catch(err => console.log('خطا در ثبت سرویس ورکر PWA:', err));
      }
    });
  </script>
</body>
</html>

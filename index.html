<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>این یا آن • ما دو تا ❤️ v3.2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <div id="myProfile"></div>
      <div id="partnerProfile"></div>
    </div>

    <h1>🎲 این یا آن • ما دو تا</h1>
    <p style="text-align:center;color:#c2185b" id="status">نسخه ۳.۲ - مدیریت آسان سوال</p>

    <div style="text-align:center; margin:15px 0;">
      <button class="btn" onclick="addNewQuestion()" style="background:#1e88e5; width:auto; padding:12px 24px;">+ سوال جدید</button>
    </div>

    <div id="game"></div>

    <div style="text-align:center">
      <button class="btn" id="finishBtn" onclick="finishGame()" disabled>پایان بازی</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    let questions = JSON.parse(localStorage.getItem('customQuestions')) || [
      {q: "قهوه یا چای؟", options: ["قهوه", "چای"]}
    ];

    let myAnswers = [];

    function renderProfiles() {
      document.getElementById('myProfile').innerHTML = `<strong>${localStorage.getItem('myName') || "من 🧔"}</strong>`;
      document.getElementById('partnerProfile').innerHTML = `<strong>${localStorage.getItem('partnerName') || "اون 💄"}</strong>`;
    }

    function addNewQuestion() {
      const q = prompt("سوال جدید:");
      if (!q) return;

      const options = [];
      for (let i = 1; i <= 4; i++) {
        const opt = prompt(`گزینه ${i} (خالی بگذار اگر کافی بود):`);
        if (!opt) break;
        options.push(opt);
      }
      if (options.length < 2) return alert("حداقل ۲ گزینه لازم است!");

      questions.push({q, options});
      localStorage.setItem('customQuestions', JSON.stringify(questions));
      renderGame();
    }

    function editQuestion(index) {
      const q = prompt("سوال جدید:", questions[index].q);
      if (q) questions[index].q = q;

      const newOptions = [];
      for (let i = 0; i < questions[index].options.length; i++) {
        const opt = prompt(`گزینه ${i+1}:`, questions[index].options[i]);
        if (opt) newOptions.push(opt);
      }
      if (newOptions.length >= 2) questions[index].options = newOptions;

      localStorage.setItem('customQuestions', JSON.stringify(questions));
      renderGame();
    }

    function deleteQuestion(index) {
      if (confirm("آیا این سوال حذف شود؟")) {
        questions.splice(index, 1);
        localStorage.setItem('customQuestions', JSON.stringify(questions));
        renderGame();
      }
    }

    function renderGame() {
      let html = '';
      myAnswers = new Array(questions.length).fill(null);

      questions.forEach((q, i) => {
        let optsHtml = q.options.map((opt, j) => 
          `<button class="option" onclick="selectAnswer(${i}, ${j})">${opt}</button>`
        ).join('');

        html += `<div class="question">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <strong>${i+1}. ${q.q}</strong>
            <div>
              <span onclick="editQuestion(${i})" style="cursor:pointer; margin:0 8px;">✏️</span>
              <span onclick="deleteQuestion(${i})" style="cursor:pointer; color:#e91e63;">🗑️</span>
            </div>
          </div>
          <div class="options">${optsHtml}</div>
        </div>`;
      });

      document.getElementById('game').innerHTML = html;
    }

    function selectAnswer(qIndex, optIndex) {
      myAnswers[qIndex] = optIndex;
      const buttons = document.querySelectorAll('.question')[qIndex].querySelectorAll('button');
      buttons.forEach((b, idx) => b.classList.toggle('selected', idx === optIndex));
      document.getElementById('finishBtn').disabled = myAnswers.includes(null);
    }

    function finishGame() {
      if (myAnswers.includes(null)) return;
      alert("بازی تموم شد! ✅\n\n(قابلیت لینک اشتراکی در نسخه بعدی اضافه می‌شود)");
    }

    window.onload = () => {
      renderProfiles();
      renderGame();
    };
  </script>
</body>
</html>

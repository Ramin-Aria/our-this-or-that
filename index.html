<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>این یا آن • ما دو تا ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <div class="profile" id="myProfile"></div>
      <div class="profile" id="partnerProfile"></div>
    </div>

    <h1>🎲 این یا آن • ما دو تا</h1>
    <p style="text-align:center;color:#c2185b" id="status">۲۰ سوال رمانتیک</p>

    <div class="progress"><div class="progress-bar" id="progress"></div></div>

    <div id="game"></div>

    <div style="text-align:center">
      <button class="btn" id="finishBtn" onclick="finishGame()" disabled>پایان بازی</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    let myName = localStorage.getItem('myName') || "من 🧔";
    let partnerName = localStorage.getItem('partnerName') || "اون 💄";

    let myAnswers = new Array(20).fill(null);
    let partnerAnswers = null;
    let isSecondPlayer = false;

    const questions = [ /* ۲۰ سوال قبلی */ 
      {q:"قهوه یا چای؟",a:"قهوه",b:"چای"},{q:"سفر دریا یا کوه؟",a:"دریا",b:"کوه"},
      {q:"صبح یا شب؟",a:"صبح",b:"شب"},{q:"بوسه روی لب یا پیشونی؟",a:"لب",b:"پیشونی"},
      {q:"هدیه دادن یا گرفتن؟",a:"دادن",b:"گرفتن"},{q:"فیلم عاشقانه یا کمدی؟",a:"عاشقانه",b:"کمدی"},
      {q:"پیام صوتی یا متن؟",a:"صوتی",b:"متن"},{q:"غافلگیری یا برنامه‌ریزی؟",a:"غافلگیری",b:"برنامه‌ریزی"},
      {q:"شام رستوران یا خونگی؟",a:"رستوران",b:"خونگی"},{q:"دست گرفتن یا بغل؟",a:"دست گرفتن",b:"بغل"},
      {q:"سفر نزدیک یا طولانی؟",a:"نزدیک",b:"طولانی"},{q:"شکلات تلخ یا شیری؟",a:"تلخ",b:"شیری"},
      {q:"موسیقی آرام یا شاد؟",a:"آرام",b:"شاد"},{q:"پنجره باز یا بسته؟",a:"باز",b:"بسته"},
      {q:"ساحلی یا شهری؟",a:"ساحلی",b:"شهری"},{q:"اول صبح یا شب بیدار؟",a:"اول صبح",b:"شب بیدار"},
      {q:"هدیه گران یا معنادار؟",a:"گران",b:"معنادار"},{q:"تلفنی یا چت؟",a:"تلفنی",b:"چت"},
      {q:"رقصیدن یا حرف زدن؟",a:"رقصیدن",b:"حرف زدن"},{q:"عاشق شدن سریع یا آهسته؟",a:"سریع",b:"آهسته"}
    ];

    function renderProfiles() {
      document.getElementById('myProfile').innerHTML = `
        <strong>${myName}</strong>
        <small onclick="editMyName()" style="color:#1e88e5;cursor:pointer;margin-right:8px;">ویرایش</small>
      `;

      document.getElementById('partnerProfile').innerHTML = `
        <strong>${partnerName}</strong>
      `;
    }

    function editMyName() {
      const name = prompt("اسمت رو بنویس:", myName);
      if (name) {
        myName = name;
        localStorage.setItem('myName', name);
        renderProfiles();
      }
    }

    function editPartnerName() {
      const name = prompt("اسم طرف مقابل رو بنویس:", partnerName);
      if (name) {
        partnerName = name;
        localStorage.setItem('partnerName', name);
        renderProfiles();
      }
    }

    // بقیه کد بازی (loadFromUrl, renderGame, finishGame و ...) رو از نسخه قبلی کپی کن
    // برای جلوگیری از طولانی شدن، فعلاً فقط پروفایل اضافه شده

    window.onload = () => {
      renderProfiles();
      // بقیه توابع رو اینجا اضافه کن (از پیام قبلی)
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>این یا آن • ما دو تا ❤️ v3.1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <div id="myProfile"></div>
      <div id="partnerProfile"></div>
    </div>

    <h1>🎲 این یا آن • ما دو تا</h1>
    <p style="text-align:center;color:#c2185b" id="status">نسخه ۳.۱ - مدیریت سوال</p>

    <div style="text-align:center; margin:15px 0;">
      <button class="btn" onclick="showQuestionEditor()" style="background:#1e88e5; width:auto; display:inline-block; padding:12px 20px;">+ سوال جدید</button>
      <button class="btn" onclick="manageQuestions()" style="background:#666; width:auto; display:inline-block; padding:12px 20px;">مدیریت سوال‌ها</button>
    </div>

    <div id="game"></div>

    <div style="text-align:center">
      <button class="btn" id="finishBtn" onclick="finishGame()" disabled>پایان بازی</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    let questions = JSON.parse(localStorage.getItem('customQuestions')) || [
      {q: "قهوه یا چای؟", options: ["قهوه", "چای"]},
      {q: "سفر دریا یا کوه؟", options: ["دریا", "کوه"]},
      {q: "صبح یا شب؟", options: ["صبح", "شب"]},
      {q: "بوسه روی لب یا پیشونی؟", options: ["لب", "پیشونی"]}
    ];

    let myAnswers = [];
    let partnerAnswers = null;

    function renderProfiles() {
      document.getElementById('myProfile').innerHTML = `<strong>${localStorage.getItem('myName') || "من 🧔"}</strong>`;
      document.getElementById('partnerProfile').innerHTML = `<strong>${localStorage.getItem('partnerName') || "اون 💄"}</strong>`;
    }

    function showQuestionEditor() {
      const q = prompt("سوال جدید رو بنویس:");
      if (!q) return;

      const options = [];
      for (let i = 1; i <= 4; i++) {
        const opt = prompt(`گزینه ${i} (خالی بگذار اگر تموم شد):`);
        if (!opt) break;
        options.push(opt);
      }

      if (options.length < 2) return alert("حداقل ۲ گزینه لازم است!");

      questions.push({q, options});
      localStorage.setItem('customQuestions', JSON.stringify(questions));
      alert("✅ سوال اضافه شد");
      renderGame();
    }

    function manageQuestions() {
      let text = "سوال‌های فعلی:\n\n";
      questions.forEach((q, i) => {
        text += `${i+1}. ${q.q} (${q.options.length} گزینه)\n`;
      });
      text += "\nبرای حذف یا ویرایش، شماره سوال رو بنویس:";
      const input = prompt(text);

      if (!input) return;

      const index = parseInt(input) - 1;
      if (isNaN(index) || index < 0 || index >= questions.length) return alert("شماره نامعتبر!");

      const action = prompt("1 = ویرایش\n2 = حذف\n\nعدد بزن:");
      if (action === "1") {
        const newQ = prompt("سوال جدید:", questions[index].q);
        if (newQ) questions[index].q = newQ;
        alert("ویرایش شد");
      } else if (action === "2") {
        if (confirm("آیا مطمئن هستی که می‌خوای این سوال حذف بشه؟")) {
          questions.splice(index, 1);
          alert("حذف شد");
        }
      }
      localStorage.setItem('customQuestions', JSON.stringify(questions));
      renderGame();
    }

    function renderGame() {
      let html = '';
      myAnswers = new Array(questions.length).fill(null);

      questions.forEach((q, i) => {
        let opts = q.options.map((opt, j) => 
          `<button class="option" onclick="selectAnswer(${i},${j})">${opt}</button>`
        ).join('');
        html += `<div class="question">
          <strong>${i+1}. ${q.q}</strong>
          <div class="options">${opts}</div>
        </div>`;
      });
      document.getElementById('game').innerHTML = html;
    }

    function selectAnswer(qIndex, optIndex) {
      myAnswers[qIndex] = optIndex;
      const qDiv = document.querySelectorAll('.question')[qIndex];
      qDiv.querySelectorAll('button').forEach((btn, idx) => {
        btn.classList.toggle('selected', idx === optIndex);
      });
      document.getElementById('finishBtn').disabled = myAnswers.includes(null);
    }

    function finishGame() {
      if (myAnswers.includes(null)) return;
      alert("بازی با موفقیت تموم شد!\n\n(لینک اشتراکی در نسخه بعدی اضافه میشه)");
    }

    window.onload = () => {
      renderProfiles();
      renderGame();
    };
  </script>
</body>
</html>

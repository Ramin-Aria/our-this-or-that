<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>این یا آن • ما دو تا ❤️ v3.3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎲 این یا آن • ما دو تا</h1>
    <p style="text-align:center;color:#c2185b" id="status">نسخه ۳.۳</p>

    <div style="text-align:center; margin:15px 0;">
      <button class="btn" onclick="addNewQuestion()" style="background:#1e88e5; width:auto; padding:12px 24px;">+ سوال جدید</button>
    </div>

    <div id="game"></div>

    <div style="text-align:center">
      <button class="btn" id="finishBtn" onclick="finishGame()" disabled>پایان بازی</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    let questions = JSON.parse(localStorage.getItem('customQuestions')) || [
      {q: "قهوه یا چای؟", options: ["قهوه", "چای"]},
      {q: "سفر دریا یا کوه؟", options: ["دریا", "کوه"]},
      {q: "صبح یا شب؟", options: ["صبح", "شب"]}
    ];

    let myAnswers = [];
    let playerName = "";

    function addNewQuestion() {
      const q = prompt("سوال جدید:");
      if (!q) return;

      const options = [];
      for (let i = 1; i <= 4; i++) {
        const opt = prompt(`گزینه ${i} (خالی برای پایان):`);
        if (!opt) break;
        options.push(opt);
      }
      if (options.length < 2) return alert("حداقل ۲ گزینه لازم است!");

      questions.push({q, options});
      localStorage.setItem('customQuestions', JSON.stringify(questions));
      renderGame();
    }

    function renderGame() {
      let html = '';
      myAnswers = new Array(questions.length).fill(null);

      questions.forEach((q, i) => {
        let opts = q.options.map((opt, j) => 
          `<button class="option" onclick="selectAnswer(${i}, ${j})">${opt}</button>`
        ).join('');
        
        html += `<div class="question">
          <div style="display:flex; justify-content:space-between;">
            <strong>${i+1}. ${q.q}</strong>
            <div>
              <span onclick="editQuestion(${i})" style="cursor:pointer;margin:0 6px;">✏️</span>
              <span onclick="deleteQuestion(${i})" style="cursor:pointer;color:#e91e63;">🗑️</span>
            </div>
          </div>
          <div class="options">${opts}</div>
        </div>`;
      });
      document.getElementById('game').innerHTML = html;
    }

    function selectAnswer(qIndex, optIndex) {
      myAnswers[qIndex] = optIndex;
      const buttons = document.querySelectorAll('.question')[qIndex].querySelectorAll('button');
      buttons.forEach((b, idx) => b.classList.toggle('selected', idx === optIndex));
      document.getElementById('finishBtn').disabled = myAnswers.includes(null);
    }

    function editQuestion(i) {
      // همان کد قبلی
      const newQ = prompt("سوال جدید:", questions[i].q);
      if (newQ) questions[i].q = newQ;
      localStorage.setItem('customQuestions', JSON.stringify(questions));
      renderGame();
    }

    function deleteQuestion(i) {
      if (confirm("حذف این سوال؟")) {
        questions.splice(i, 1);
        localStorage.setItem('customQuestions', JSON.stringify(questions));
        renderGame();
      }
    }

    function finishGame() {
      if (myAnswers.includes(null)) return;

      playerName = prompt("اسمت چیه؟", playerName || "");
      if (!playerName) return;

      let html = `<h2 style="text-align:center">🎉 بازی توسط ${playerName} تموم شد!</h2>`;
      html += `<p>جواب‌ها ثبت شد.</p>`;

      document.getElementById('result').innerHTML = html;
      document.getElementById('result').style.display = 'block';
    }

    window.onload = renderGame;
  </script>
</body>
</html>
